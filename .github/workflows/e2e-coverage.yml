name: CI / E2E Test w/ Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    # E2E is informational — does not block merge
    continue-on-error: true

    env:
      OPENAI_API_KEY: test-key-not-real
      LITELLM_BASE_URL: http://localhost:4000
      LITELLM_MASTER_KEY: test-master-key
      BASE_URL: http://localhost:8000
      # Passed when the secret is configured for this branch/environment.
      # When unset, pytest_collection_modifyitems auto-skips requires_replicate tests.
      REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
      REPLICATE_USERNAME: ${{ secrets.REPLICATE_USERNAME }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Poetry and dependencies
        uses: ./.github/actions/poetry_setup
        with:
          python-version: "3.12"
          install-args: --with test

      - name: Install Playwright browsers
        run: poetry run playwright install --with-deps chromium

      - name: Start FastAPI test server
        run: |
          poetry run uvicorn cqc_lem.api.main:app --host 0.0.0.0 --port 8000 &
          # Wait for the server to accept connections
          for i in $(seq 1 10); do
            curl -sf http://localhost:8000/health && break || sleep 2
          done
        env:
          MYSQL_HOST: ""
          MYSQL_USER: ""
          MYSQL_PASSWORD: ""
          MYSQL_DATABASE: ""
          OPENAI_API_KEY: test-key-not-real
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          REPLICATE_USERNAME: ${{ secrets.REPLICATE_USERNAME }}

      - name: Run E2E tests
        run: |
          set +e
          poetry run pytest tests/e2e \
            -v --tb=short \
            -m e2e \
            --cov=src/cqc_lem \
            --cov-report=xml
          rc=$?
          set -e
          # Exit code 5 = no tests collected; treat as passing
          [ $rc -eq 5 ] && echo "No E2E tests collected — skipping" && exit 0 || exit $rc

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: e2e
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
