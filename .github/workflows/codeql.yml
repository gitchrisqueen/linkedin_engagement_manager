name: CodeQL Advanced

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 10 * * 1"  # Monday 10:00 UTC (offset from codeql-analysis.yml)

jobs:
  codeql-advanced:
    name: Advanced Analysis (${{ matrix.language }})
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Poetry and dependencies
        uses: ./.github/actions/poetry_setup
        with:
          python-version: "3.12"
          install-args: --without test

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
          config: |
            paths:
              - src/cqc_lem
            paths-ignore:
              - tests
              - src/cqc_lem/ui/dist

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Advanced Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}/advanced"
          upload: true
