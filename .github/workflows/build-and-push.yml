name: Build & Deploy Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to build & deploy (defaults to the ref)"
        required: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/cqc-lem

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve version tag
        id: ver
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./compose/local/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.tag }}
            ${{ env.IMAGE }}:latest
          build-args: |
            INSTALL_DEV_DEPS=false
            VITE_API_TOKEN=${{ secrets.UI_API_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hostinger VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    # Protected environment. The required-reviewer gate was removed so green
    # releases auto-deploy; re-add reviewers in repo settings to restore it.
    environment: production
    env:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
    steps:
      # SSH to the VPS can intermittently time out ("dial tcp :22 i/o timeout"), and the
      # default 10m command_timeout once KILLED `docker compose up` mid-recreation, taking
      # the stack down. Fix: a larger command_timeout (deploy.sh health-checks + rolls back
      # within it, so it must not be cut off) plus up to 3 attempts with backoff to ride
      # out transient SSH failures. deploy.sh is idempotent, so retries are safe.
      - name: Deploy over SSH (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 60s
          command_timeout: 25m
          script_stop: true
          envs: GHCR_USER,GHCR_PAT
          script: |
            cd /opt/lem
            ./scripts/deploy.sh "${{ needs.build-and-push.outputs.tag }}"
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}

      - name: Backoff before deploy retry 2
        if: ${{ steps.deploy1.outcome == 'failure' }}
        run: sleep 45

      - name: Deploy over SSH (attempt 2)
        id: deploy2
        if: ${{ steps.deploy1.outcome == 'failure' }}
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 60s
          command_timeout: 25m
          script_stop: true
          envs: GHCR_USER,GHCR_PAT
          script: |
            cd /opt/lem
            ./scripts/deploy.sh "${{ needs.build-and-push.outputs.tag }}"
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}

      - name: Backoff before deploy retry 3
        if: ${{ steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure' }}
        run: sleep 90

      - name: Deploy over SSH (attempt 3, final)
        id: deploy3
        if: ${{ steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 60s
          command_timeout: 25m
          script_stop: true
          envs: GHCR_USER,GHCR_PAT
          script: |
            cd /opt/lem
            ./scripts/deploy.sh "${{ needs.build-and-push.outputs.tag }}"
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}

      # Purge the CDN so users get the new index.html shell immediately instead
      # of a cached one pointing at the previous (hashed) bundle. Skips cleanly
      # if the Cloudflare secrets aren't configured.
      - name: Purge Cloudflare cache
        if: ${{ env.CF_API_TOKEN != '' && env.CF_ZONE_ID != '' }}
        run: |
          resp=$(curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$resp"
          echo "$resp" | grep -q '"success":true' \
            && echo "Cloudflare cache purged" \
            || { echo "Cloudflare purge failed"; exit 1; }
