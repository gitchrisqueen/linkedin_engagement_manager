name: "Poetry Setup"
description: "Set up Python with Poetry and restore cached virtual environment"

inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: "3.12"
  poetry-version:
    description: "Poetry version to install"
    required: false
    default: "1.8.3"
  working-directory:
    description: "Working directory for Poetry install"
    required: false
    default: "."
  install-args:
    description: "Extra arguments for poetry install (e.g. --with test)"
    required: false
    default: "--with test"

runs:
  using: "composite"
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: ${{ inputs.poetry-version }}
        virtualenvs-create: true
        virtualenvs-in-project: true
        installer-parallel: true

    - name: Cache Poetry virtual environment
      id: cache-venv
      uses: actions/cache@v4
      with:
        path: ${{ inputs.working-directory }}/.venv
        key: venv-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles(format('{0}/poetry.lock', inputs.working-directory)) }}-${{ inputs.install-args }}
        restore-keys: |
          venv-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles(format('{0}/poetry.lock', inputs.working-directory)) }}-
          venv-${{ runner.os }}-${{ inputs.python-version }}-

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: poetry install ${{ inputs.install-args }} --no-interaction
