services:
  web_app:
    build:
      context: .
      dockerfile: ./compose/local/Dockerfile
      args:
        - INSTALL_DEV_DEPS=${INSTALL_DEV_DEPS}
    image: "${DOCKER_IMAGE_NAME}:latest"
    container_name: web_app
    command: /start-fastapi
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./logs:/app/logs
    env_file:
      - .env
    ports:
      - "${API_PORT}:${API_PORT}"

  redis:
    image: redis:alpine
    container_name: redis
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: ${MYSQL_HOST}
    hostname: ${MYSQL_HOST}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${MYSQL_PORT}:${MYSQL_PORT}"
    volumes:
      - db_data:/var/lib/mysql
      - ./compose/local/database/setup.sql:/docker-entrypoint-initdb.d/setup.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  flyway:
    image: redgate/flyway:latest-alpine
    container_name: flyway
    entrypoint: /flyway-entrypoint.sh
    env_file:
      - .env
    volumes:
      - ./compose/local/database/migrations:/flyway/sql
      - ./compose/local/database/flyway-entrypoint.sh:/flyway-entrypoint.sh
    depends_on:
      mysql:
        condition: service_healthy

  celery_worker:
    image: ${DOCKER_IMAGE_NAME}
    container_name: celery_worker
    hostname: ${CELERY_WORKER_HOST}
    command: /start-celeryworker
    deploy:
      resources:
        limits:
          cpus: '4'
        reservations:
          cpus: '2'
    volumes:
      - ~/.aws:/home/celeryworker/.aws:ro
    volumes_from:
      - web_app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      selenium-chrome:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery --app cqc_lem.app.my_celery inspect ping -t 5 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  celery_beat:
    image: ${DOCKER_IMAGE_NAME}
    container_name: celery_beat
    command: /start-celerybeat
    volumes_from:
      - web_app
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      selenium-chrome:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import os, sys; sys.exit(0 if any('celery' in l and 'beat' in l for l in open('/proc/%s/cmdline' % p).read().replace(chr(0),' ') for p in os.listdir('/proc') if p.isdigit() and os.path.exists('/proc/%s/cmdline' % p)) else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  flower:
    image: ${DOCKER_IMAGE_NAME}
    container_name: celery_flower
    command: /start-flower-no-wait
    volumes:
      - ./logs:/app/logs
      - flower_db:/data
    volumes_from:
      - web_app
    env_file:
      - .env
    environment:
      - FLOWER_UNAUTHENTICATED_API=True
      - FLOWER_PERSISTENT=False
    ports:
      - "${CELERY_FLOWER_PORT}:${CELERY_FLOWER_PORT}"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${CELERY_FLOWER_PORT}/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  selenium-chrome:
    image: selenium/standalone-chrome:latest
    container_name: selenium-chrome
    hostname: selenium-chrome
    shm_size: 2g
    ports:
      - "${SELENIUM_HUB_PORT}:4444"
      - "7900:7900"
    environment:
      - SE_NODE_MAX_SESSIONS=1
      - SE_NODE_SESSION_TIMEOUT=600
      - SE_LOG_LEVEL=WARN
    volumes:
      - chrome-profile:/home/seluser/chrome-profile
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4g
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4444/wd/hub/status | python3 -c \"import sys,json; d=json.load(sys.stdin); sys.exit(0 if d['value']['ready'] else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    hostname: litellm
    ports:
      - "4000:4000"
    volumes:
      - ./.litellm:/app/.litellm
    command: ["--config", "/app/.litellm/config.yaml", "--port", "4000"]
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - OLLAMA_CLOUD_URL=${OLLAMA_CLOUD_URL}
      - OLLAMA_CLOUD_API_KEY=${OLLAMA_CLOUD_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy

volumes:
  db_data:
  redis_data:
  flower_db:
  chrome-profile:
